name: INN Auto Deploy

on:
  gist:
  workflow_dispatch:
  schedule:
    - cron: '*/10 * * * *'  # Verifica a cada 10 minutos

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Baixar INN mais recente do Gist
        run: |
          curl -s -H "Authorization: token ${{ secrets.GIST_TOKEN }}" \
            "https://api.github.com/gists/${{ secrets.GIST_ID }}" \
            | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          content = data['files']['inn.html']['content']
          with open('index.html', 'w', encoding='utf-8') as f:
              f.write(content)
          print('INN baixado:', len(content), 'bytes')
          "

      - name: Ler versao atual e incrementar
        run: |
          if [ -f versao.txt ]; then
            VERSAO=$(cat versao.txt)
          else
            VERSAO=1000
          fi
          NOVA=$((VERSAO + 1))
          echo $NOVA > versao.txt
          echo "VERSAO=$NOVA" >> $GITHUB_ENV
          echo "Nova versao: v1.$NOVA"

      - name: Atualizar versao no INN
        run: |
          sed -i "s/v1\.[0-9]*/v1.${{ env.VERSAO }}/g" index.html

      - name: Commit e Push
        run: |
          git config user.email "inn@f3f.energy"
          git config user.name "INN Bot"
          git add index.html versao.txt
          git diff --staged --quiet || git commit -m "INN v1.${{ env.VERSAO }} - deploy automatico"
          git push
